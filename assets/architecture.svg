<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" style="background:#020617;font-family:'JetBrains Mono',monospace">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34d399"/>
    </marker>
    <linearGradient id="grad-sn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/><stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="grad-ecn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/><stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="grad-dmn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1000" height="720" fill="url(#grid)"/>

  <!-- Title -->
  <text x="500" y="36" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="bold">NeuroFlow MultiModal Architecture</text>
  <text x="500" y="56" text-anchor="middle" fill="#64748b" font-size="11">Brain-Inspired Modular Neural Network · C++17 · SIMD Optimized</text>

  <!-- ========== INPUT LAYER ========== -->
  <rect x="30" y="70" width="940" height="2" fill="#334155"/>
  <text x="50" y="95" fill="#94a3b8" font-size="10" font-weight="bold">INPUT</text>

  <!-- Text Input -->
  <rect x="120" y="80" width="180" height="42" rx="6" fill="#0f172a"/>
  <rect x="120" y="80" width="180" height="42" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="210" y="100" text-anchor="middle" fill="#22d3ee" font-size="11" font-weight="bold">Text Input</text>
  <text x="210" y="114" text-anchor="middle" fill="#64748b" font-size="8">[batch, text_dim]</text>

  <!-- Image Input -->
  <rect x="400" y="80" width="180" height="42" rx="6" fill="#0f172a"/>
  <rect x="400" y="80" width="180" height="42" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="490" y="100" text-anchor="middle" fill="#34d399" font-size="11" font-weight="bold">Image Input</text>
  <text x="490" y="114" text-anchor="middle" fill="#64748b" font-size="8">[batch, 3, H, W]</text>

  <!-- Arrows from inputs -->
  <line x1="210" y1="122" x2="210" y2="155" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="490" y1="122" x2="490" y2="155" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Text Projection -->
  <rect x="120" y="158" width="180" height="42" rx="6" fill="#0f172a"/>
  <rect x="120" y="158" width="180" height="42" rx="6" fill="rgba(8,51,68,0.3)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="210" y="178" text-anchor="middle" fill="#22d3ee" font-size="11">TextProject</text>
  <text x="210" y="192" text-anchor="middle" fill="#64748b" font-size="8">Linear + LayerNorm</text>

  <!-- Vision Encoder -->
  <rect x="370" y="158" width="240" height="42" rx="6" fill="#0f172a"/>
  <rect x="370" y="158" width="240" height="42" rx="6" fill="rgba(6,78,59,0.3)" stroke="#34d399" stroke-width="1.5"/>
  <text x="490" y="178" text-anchor="middle" fill="#34d399" font-size="11">Vision Encoder</text>
  <text x="490" y="192" text-anchor="middle" fill="#64748b" font-size="8">PatchEmbed + Transformer · SIMD</text>

  <!-- Arrows to Fusion -->
  <line x1="210" y1="200" x2="210" y2="235" stroke="#64748b" stroke-width="1.5"/>
  <line x1="490" y1="200" x2="490" y2="235" stroke="#64748b" stroke-width="1.5"/>
  <path d="M 220 200 Q 350 218 480 220" fill="none" stroke="#64748b" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Cross-Modal Fusion -->
  <rect x="250" y="238" width="500" height="48" rx="6" fill="#0f172a"/>
  <rect x="250" y="238" width="500" height="48" rx="6" fill="rgba(76,29,149,0.25)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="500" y="258" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="bold">Cross-Modal Fusion</text>
  <text x="500" y="274" text-anchor="middle" fill="#64748b" font-size="8">Text-Image Alignment · Similarity Scoring · Cross-Attention</text>

  <line x1="500" y1="286" x2="500" y2="320" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- MultiModal Attention -->
  <rect x="280" y="323" width="440" height="42" rx="6" fill="#0f172a"/>
  <rect x="280" y="323" width="440" height="42" rx="6" fill="rgba(76,29,149,0.2)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="500" y="343" text-anchor="middle" fill="#a78bfa" font-size="11">MultiModal Attention</text>
  <text x="500" y="357" text-anchor="middle" fill="#64748b" font-size="8">Text ↔ Image Cross-Attention · Reasoning</text>

  <!-- ========== BRAIN MODULES BOUNDARY ========== -->
  <rect x="30" y="378" width="940" height="2" fill="#334155"/>
  <text x="50" y="403" fill="#94a3b8" font-size="10" font-weight="bold">BRAIN-INSPIRED MODULES</text>

  <!-- Boundary box -->
  <rect x="28" y="410" width="944" height="200" rx="12" fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="48" y="432" fill="#475569" font-size="9">🧠 Neuromorphic Cognitive Architecture</text>

  <!-- SN -->
  <rect x="60" y="448" width="260" height="90" rx="8" fill="#0f172a"/>
  <rect x="60" y="448" width="260" height="90" rx="8" fill="rgba(120,53,15,0.25)" stroke="#fbbf24" stroke-width="2"/>
  <text x="190" y="470" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="bold">SN · Salience Network</text>
  <text x="190" y="486" text-anchor="middle" fill="url(#grad-sn)" font-size="9">AI + ACC</text>
  <text x="190" y="500" text-anchor="middle" fill="#94a3b8" font-size="8">Saliency Detection</text>
  <text x="190" y="514" text-anchor="middle" fill="#94a3b8" font-size="8">Gate Generation · Anomaly Detection</text>

  <!-- ECN -->
  <rect x="370" y="448" width="260" height="90" rx="8" fill="#0f172a"/>
  <rect x="370" y="448" width="260" height="90" rx="8" fill="rgba(6,78,59,0.25)" stroke="#22d3ee" stroke-width="2"/>
  <text x="500" y="470" text-anchor="middle" fill="#22d3ee" font-size="12" font-weight="bold">ECN · Executive Control</text>
  <text x="500" y="486" text-anchor="middle" fill="#22d3ee" font-size="9">dlPFC + OFC</text>
  <text x="500" y="500" text-anchor="middle" fill="#94a3b8" font-size="8">Logical Reasoning</text>
  <text x="500" y="514" text-anchor="middle" fill="#94a3b8" font-size="8">Value Evaluation · Decision Making</text>

  <!-- DMN -->
  <rect x="680" y="448" width="260" height="90" rx="8" fill="#0f172a"/>
  <rect x="680" y="448" width="260" height="90" rx="8" fill="rgba(76,29,149,0.25)" stroke="#a78bfa" stroke-width="2"/>
  <text x="810" y="470" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="bold">DMN · Default Mode</text>
  <text x="810" y="486" text-anchor="middle" fill="#a78bfa" font-size="9">PCC + mPFC</text>
  <text x="810" y="500" text-anchor="middle" fill="#94a3b8" font-size="8">Associative Memory</text>
  <text x="810" y="514" text-anchor="middle" fill="#94a3b8" font-size="8">Future Planning · Cross-Modal</text>

  <!-- Arrows between networks -->
  <line x1="320" y1="493" x2="368" y2="493" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="630" y1="493" x2="678" y2="493" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 370 470 Q 340 440 320 460" fill="none" stroke="#64748b" stroke-width="1" stroke-dasharray="2,2"/>
  <path d="M 630 470 Q 660 440 680 460" fill="none" stroke="#64748b" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- ========== MEMORY ========== -->
  <rect x="30" y="618" width="940" height="2" fill="#334155"/>
  <text x="50" y="643" fill="#94a3b8" font-size="10" font-weight="bold">MEMORY</text>

  <rect x="100" y="630" width="800" height="48" rx="6" fill="#0f172a"/>
  <rect x="100" y="630" width="800" height="48" rx="6" fill="rgba(251,146,60,0.15)" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="500" y="650" text-anchor="middle" fill="#fb923c" font-size="11" font-weight="bold">Memory Consolidation Module (LTP)</text>
  <text x="500" y="666" text-anchor="middle" fill="#64748b" font-size="8">64-Slot Long Memory · MLA KV Cache (87.5% Compression) · Paged Overflow · Online Learning</text>

  <!-- ========== OUTPUT ========== -->
  <rect x="30" y="685" width="940" height="2" fill="#334155"/>
  <text x="50" y="708" fill="#94a3b8" font-size="10" font-weight="bold">OUTPUT</text>

  <rect x="150" y="693" width="700" height="22" rx="4" fill="rgba(34,211,238,0.1)" stroke="#22d3ee" stroke-width="1"/>
  <text x="500" y="708" text-anchor="middle" fill="#22d3ee" font-size="9">
    Decision · Value · Saliency · Text-Image Similarity · Anomaly Score · Retrieved Memory · Neural Manifold
  </text>

  <!-- Performance badge -->
  <rect x="760" y="36" width="210" height="20" rx="4" fill="rgba(34,211,238,0.1)" stroke="#22d3ee" stroke-width="0.5"/>
  <text x="865" y="50" text-anchor="middle" fill="#22d3ee" font-size="8">⚡ Lite: 43K params · 0.40ms · 98× speedup</text>
</svg>
